{% extends "base.html" %} {% block content %}
<div class="max-w-5xl mx-auto p-6 flex flex-col gap-10 justify-center items-center w-full" lang="{{ page.lang | default(value="en") }}">
    <div
        class="prose prose-invert prose-lg max-w-none text-xl text-text-secondary leading-[1.8] font-sans mb-8 space-y-6"
        id="content-rendered"
    >
        {{ content | safe }}
    </div>

    <div class="flex flex-col gap-16">
        {% for section in page.extra.data %}
        <section class="flex flex-col gap-8 md:gap-10">
            <h2
                class="text-4xl md:text-4xl font-bold text-white leading-none font-serif"
            >
                {{ section.title}}
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                {% for item in section.items %}
                <div
                    class="flex flex-col gap-4 md:gap-4 p-6 md:p-6 rounded-2xl bg-bg-secondary border border-border group relative overflow-hidden shadow-lg transition-all duration-300 hover:shadow-2xl"
                >
                    <div
                        class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent transition-transform duration-500 ease-in-out group-hover:translate-x-full"
                    ></div>
                    <div>
                        <a
                            href="{{ item.link }}"
                            target="_blank"
                            rel="noopener noreferrer"
                        >
                            <h3
                                class="text-xl md:text-[28px] font-bold text-accent font-serif"
                            >
                                {{ item.title }}
                                <span
                                    class="w-5 h-5 bg-white self-baseline inline-block ml-2"
                                    alt="Link to showcase {{ item.title }}"
                                    title="Link to showcase {{ item.title }}"
                                    style="mask-image: url('{{ prefix }}/external-link.svg'); mask-repeat: no-repeat; mask-size: contain;"
                                ></span>
                            </h3>
                        </a>
                    </div>
                    <p
                        class="text-base md:text-[18px] text-text-secondary leading-relaxed"
                    >
                        {{ item.description }}
                    </p>
                </div>
                {% endfor %}
            </div>
        </section>
        {% endfor %}
    </div>
</div>
{% endblock content %}
