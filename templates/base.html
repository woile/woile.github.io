<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ title }} | {{ config.title }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="{{ prefix }}/style.css" />
        <link rel="stylesheet" href="{{ prefix }}/theme.css" />
    </head>
    <body class="bg-bg-primary text-text-secondary min-h-screen">
        <header
            class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 lg:px-24 py-6 md:py-10 w-full max-w-[1440px] mx-auto gap-6 md:gap-0"
        >
            <a
                href="{{ prefix }}/"
                class="text-logo font-serif text-2xl md:text-[32px] font-bold"
            >
                woile
            </a>
            <nav class="flex gap-6 md:gap-12">
                <a
                    href="{{ prefix }}/"
                    class="text-text-secondary hover:text-white transition-colors text-base md:text-[18px]"
                >
                    About
                </a>
                <a
                    href="{{ prefix }}/blog/"
                    class="text-text-secondary hover:text-white transition-colors text-base md:text-[18px]"
                >
                    Writing
                </a>
            </nav>
            <a
                href="mailto:santiwilly@gmail.com"
                class="text-accent font-bold text-base md:text-[18px] hover:opacity-80 transition-opacity"
            >
                Let's Talk &rarr;
            </a>
        </header>
        <main class="w-full max-w-[1440px] mx-auto">
            {% block content %}{% endblock content %}
        </main>
        <footer
            class="px-6 md:px-10 lg:px-24 py-10 md:py-[60px] text-text-muted text-sm text-center"
        >
            &copy; 2026 woile. Built with craft.
            <a href="{{ prefix }}/feed.xml" title="Atom Feed">⚛</a>
        </footer>
    </body>
</html>
