{% set fediverse = "@woile@hachyderm.io" %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ title }} | {{ config.title }}</title>
        <link rel="canonical" href="{{ config.base_url }}{{ page_path }}" />
        <meta
            name="description"
            content="{% if page.description %}{{ page.description }}{% elif config.description %}{{ config.description }}{% else %}Santiago Fraire Willemoes website{% endif %}"
        />

        <link
            rel="preload"
            href="{{ prefix }}/fonts/Inter-Variable.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link rel="stylesheet" href="{{ prefix }}/fonts.css" />

        <!-- Open Graph -->
        <meta property="og:title" content="{{ title }}" />
        <meta
            property="og:url"
            content="{{ config.base_url | safe }}{{ page_path }}"
        />
        <meta property="og:site_name" content="{{ config.title }}" />
        <meta
            property="og:type"
            content="{% if page.date %}article{% else %}website{% endif %}"
        />
        {% if page.description %}
        <meta property="og:description" content="{{ page.description }}" />
        {% elif config.description %}
        <meta property="og:description" content="{{ config.description }}" />
        {% endif %} {% if fediverse %}
        <meta name="fediverse:creator" content="{{ fediverse }}" />
        <link rel="me" href="https://hachyderm.io/" />
        {% endif %}

        <!-- Preview image -->
        <meta
            property="og:image"
            content="{{ config.base_url | safe }}/me-1024x1024.jpg"
        />

        <!-- Styles -->
        <link rel="stylesheet" href="{{ prefix }}/style.css" />
        <link rel="stylesheet" href="{{ prefix }}/theme.css" />
        <script
            src="https://cdn.counter.dev/script.js"
            data-id="acc7e853-fadb-4b91-a2f2-801890951f1e"
            data-utcoffset="1"
        ></script>
    </head>
    <body class="bg-bg-primary text-text-secondary min-h-screen flex flex-col">
        <header
            class="flex flex-col md:flex-row justify-between items-center px-6 md:px-10 lg:px-24 py-6 md:py-10 w-full max-w-[1440px] mx-auto gap-6 md:gap-0"
        >
            <a
                href="{{ prefix }}/"
                class="text-logo font-serif text-2xl md:text-[32px] font-bold"
            >
                woile
            </a>
            <nav class="flex gap-6 md:gap-12">
                <a
                    href="{{ prefix }}/bio.html"
                    class="group relative text-text-secondary hover:text-white transition-colors text-base md:text-[18px]"
                >
                    <!-- Caret on hover -->
                    <span
                        class="relative mr-1 inline-block translate-y-4 text-green-400 opacity-0 transition-all duration-300 ease-out group-hover:translate-y-0 group-hover:opacity-100"
                    >
                        &gt;
                    </span>
                    Bio
                </a>
                <a
                    href="{{ prefix }}/blog/"
                    class="group relative text-text-secondary hover:text-white transition-colors text-base md:text-[18px]"
                >
                    <!-- Caret on hover -->
                    <span
                        class="relative mr-1 inline-block translate-y-4 text-green-400 opacity-0 transition-all duration-300 ease-out group-hover:translate-y-0 group-active:translate-y-0 group-hover:opacity-100"
                    >
                        &gt;
                    </span>
                    Writing
                </a>
            </nav>
            <a
                href="mailto:santiwilly@gmail.com"
                class="text-accent font-bold text-base md:text-[18px] hover:opacity-80 transition-opacity"
            >
                Let's Talk &rarr;
            </a>
        </header>
        <main class="w-full max-w-[1440px] mx-auto grow">
            {% block content %}{% endblock content %}
        </main>
        <footer
            class="px-6 md:px-10 lg:px-24 py-10 md:py-[60px] text-text-muted text-sm text-center"
        >
            <div class="flex flex-wrap gap-4 w-full justify-center mb-3">
                <a
                    href="https://www.linkedin.com/in/santiago-fraire-willemoes/?locale=en"
                    class="inline-block"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        src="{{ prefix }}/logo-linkedin.svg"
                        alt="LinkedIn"
                        class="w-6 h-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 hover:scale-110 transition-all duration-300"
                    />
                </a>
                <a
                    rel="me"
                    href="https://hachyderm.io/@woile"
                    class="inline-block"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        src="{{ prefix }}/logo-mastodon.svg"
                        alt="Mastodon"
                        class="w-6 h-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 hover:scale-110 transition-all duration-300"
                    />
                </a>
                <a
                    href="https://github.com/woile"
                    class="inline-block"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        src="{{ prefix }}/logo-github.svg"
                        alt="GitHub"
                        class="w-6 h-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 hover:scale-110 transition-all duration-300"
                    />
                </a>
                <a
                    href="https://codeberg.org/woile"
                    class="inline-block"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <img
                        src="{{ prefix }}/logo-codeberg.svg"
                        alt="Codeberg"
                        class="w-6 h-6 grayscale opacity-70 hover:grayscale-0 hover:opacity-100 hover:scale-110 transition-all duration-300"
                    />
                </a>
            </div>
            &copy; 2026 woile. Built with care.
            <a href="{{ prefix }}/feed.xml" title="Atom Feed">⚛</a>
        </footer>
    </body>
</html>
