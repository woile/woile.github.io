{% extends "base.html" %} {% block content %}
<section
    class="max-w-3xl mx-auto py-10 flex flex-col gap-12 md:gap-20 px-6 md:px-1"
>
    {% for item in items %}
    <article
        class="flex flex-col gap-4 max-w-3xl"
        {%
        if
        item.frontmatter.lang
        %}
        lang="{{ item.frontmatter.lang }}"
        {%
        endif
        %}
    >
        <div
            class="flex items-center gap-4 text-accent font-mono text-[10px] md:text-xs tracking-[2px]"
        >
            <span>
                {{ item.frontmatter.date | default(value="TBD") | upper }}
            </span>
            <!--<span>·</span>
            <span>8 MIN READ</span>-->
        </div>
        <a href="{{ prefix }}{{ item.path }}" class="group">
            <h2
                class="text-2xl md:text-4xl font-bold text-white group-hover:text-accent transition-colors font-serif"
            >
                {{ item.frontmatter.title }}
            </h2>
        </a>
        {% if item.frontmatter.description %}
        <p class="text-base md:text-[18px] text-text-secondary leading-relaxed">
            {{ item.frontmatter.description }}
        </p>
        {% endif %}
    </article>
    {% endfor %}
</section>
{% endblock content %}
