{# Just used for the home page #} {% extends "base.html" %} {% block content %}
<section
    class="flex flex-col lg:flex-row gap-12 lg:gap-20 px-6 md:px-10 lg:px-24 py-10 lg:py-[100px] items-center"
    id="approach"
>
    <div class="flex-1 flex flex-col gap-6 md:gap-8">
        <span class="text-accent font-mono text-xs md:text-sm tracking-[2px]"
            >SOFTWARE CRAFTSMANSHIP</span
        >
        <div
            class="text-4xl md:text-6xl lg:text-[72px] leading-[1.1] font-bold text-white font-serif prose prose-invert max-w-none"
        >
            {{ page.title }}
        </div>
        <p
            class="text-lg md:text-[22px] text-text-secondary leading-relaxed max-w-[600px]"
        >
            {{ page.description }}
        </p>
        <div
            class="flex flex-wrap gap-6 w-full justify-center md:justify-start"
        >
            <a
                href="https://www.linkedin.com/in/santiago-fraire-willemoes/?locale=en"
                class="inline-block"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ prefix }}/logo-linkedin.svg"
                    class="w-8 h-8 brightness-60 hover:brightness-100 hover:scale-120 transition-all duration-200"
                    alt="LinkedIn"
                />
            </a>
            <a
                href="https://hachyderm.io/@woile"
                class="inline-block"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ prefix }}/logo-mastodon.svg"
                    class="w-8 h-8 brightness-60 hover:brightness-100 hover:scale-120 transition-all duration-200"
                    alt="Mastodon"
                />
            </a>
            <a
                href="https://github.com/woile"
                class="inline-block"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ prefix }}/logo-github.svg"
                    class="w-8 h-8 brightness-60 hover:brightness-100 hover:scale-120 transition-all duration-200"
                    alt="GitHub"
                />
            </a>
            <a
                href="https://codeberg.org/woile"
                class="inline-block"
                target="_blank"
                rel="noopener noreferrer"
            >
                <img
                    src="{{ prefix }}/logo-codeberg.svg"
                    class="w-8 h-8 brightness-60 hover:brightness-100 hover:scale-120 transition-all duration-200"
                    alt="Codeberg"
                />
            </a>
        </div>
    </div>
    <div
        class="w-full lg:w-[500px] aspect-5/6 lg:h-[600px] rounded-3xl overflow-hidden bg-bg-secondary"
    >
        <img
            src="{{ prefix }}/me-1024x1024.jpg"
            alt="woile"
            class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500"
        />
    </div>
</section>

<section
    class="px-6 md:px-10 lg:px-24 py-10 lg:py-[100px] flex flex-col gap-8 md:gap-15"
    id="competencies"
>
    <h2 class="text-3xl md:text-5xl font-bold text-white">
        My Approach to Engineering
        <a href="#competencies" class="heading-anchor"></a>
    </h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
        {% for item in page.extra.competencies %}
        <div
            class="flex flex-col gap-4 md:gap-6 p-6 md:p-10 rounded-2xl bg-bg-secondary border border-border group relative overflow-hidden shadow-lg transition-all duration-300 hover:shadow-2xl"
        >
            <div
                class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/20 to-transparent transition-transform duration-500 ease-in-out group-hover:translate-x-full"
            ></div>
            <h3
                class="text-2xl md:text-[28px] font-bold text-accent font-serif"
            >
                {{ item.title }}
            </h3>
            <p
                class="text-base md:text-[18px] text-text-secondary leading-relaxed"
            >
                {{ item.description }}
            </p>
        </div>

        {% endfor %}
    </div>
</section>
{% endblock content %}
