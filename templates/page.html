{# Standalone pages #}
{% extends "base.html" %} {% block content %}
<article class="max-w-3xl mx-auto px-10 py-[60px] flex flex-col gap-10" lang="{{ page.lang | default(value="en") }}">
    <h1 class="text-6xl font-bold text-white leading-[1.1]">{{ page.title }}</h1>
    <div
        class="prose prose-invert prose-lg max-w-none text-xl text-text-secondary leading-[1.8] font-sans"
        id="content-rendered"
    >
        {{ content | safe }}
    </div>
</article>
{% endblock content %}
